<!-- @dsCard group="Effects" viewport="700x170" subtitle="Shadows, glow & pulse" name="Shadows & motion" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg-app);color:var(--text-hi);font-family:var(--font-sans);padding:16px}</style></head><body>
<div style="display:flex;gap:16px;align-items:center;height:130px">
  <button style="height:52px;padding:0 22px;border:none;border-radius:var(--r-xl);background:var(--lime);color:var(--on-lime);font-weight:900;font-size:15px;box-shadow:var(--shadow-btn);font-family:inherit">CTA · shadow-btn</button>
  <div style="width:74px;height:74px;border-radius:var(--r-3xl);background:var(--surface-2);border:1.5px solid var(--lime-line);animation:glow 2.2s infinite"></div>
  <span style="width:12px;height:12px;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite"></span>
  <span style="display:inline-flex;align-items:center;gap:6px;color:var(--lime);font-weight:800;font-size:13px"><span style="width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:var(--glow-dot)"></span>glow-dot</span>
</div></body></html>
